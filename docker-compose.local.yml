services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: councilsense
      POSTGRES_USER: councilsense
      POSTGRES_PASSWORD: councilsense
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U councilsense -d councilsense"]
      interval: 5s
      timeout: 5s
      retries: 20

  storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: councilsense
      MINIO_ROOT_PASSWORD: councilsense123
    ports:
      - "9000:9000"
      - "9001:9001"

  queue:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    environment:
      AUTH_SESSION_SECRET: local-runtime-secret
      COUNCILSENSE_DISABLE_AUTH_GUARD: "true"
      COUNCILSENSE_LOCAL_DEV_AUTH_USER_ID: local-dev-user
      COUNCILSENSE_RUNTIME_ENV: local
      COUNCILSENSE_SECRET_SOURCE: env
      COUNCILSENSE_SQLITE_PATH: /data/councilsense-local.db
      SUPPORTED_CITY_IDS: city-eagle-mountain-ut
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "councilsense.app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]
    volumes:
      - runtime_data:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    environment:
      AUTH_SESSION_SECRET: local-runtime-secret
      COUNCILSENSE_DISABLE_AUTH_GUARD: "true"
      COUNCILSENSE_LOCAL_DEV_AUTH_USER_ID: local-dev-user
      COUNCILSENSE_RUNTIME_ENV: local
      COUNCILSENSE_SECRET_SOURCE: env
      COUNCILSENSE_SQLITE_PATH: /data/councilsense-local.db
    command:
      [
        "python",
        "-m",
        "councilsense.app.local_runtime",
        "worker-loop",
        "--interval-seconds",
        "1.5"
      ]
    volumes:
      - runtime_data:/data
    depends_on:
      - api

  web:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      API_INTERNAL_BASE_URL: http://api:8000
      NEXT_PUBLIC_DISABLE_AUTH_GUARD: "true"
      NEXT_PUBLIC_LOCAL_DEV_AUTH_TOKEN: local-dev-bypass-token
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  runtime_data:
